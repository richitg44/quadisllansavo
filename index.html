@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--red:#C3002F;--dark:#0a0a0a;--mid:#1a1a1a;--card:#141414;--border:#2a2a2a;--text:#e8e8e8;--muted:#666;--green:#22c55e;--yellow:#f59e0b;--blue:#3b82f6;--nav-h:64px;--safe-bottom:env(safe-area-inset-bottom,0px)}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overscroll-behavior:none}
.header{background:var(--dark);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:16px;height:58px;position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--red)}
.logo span{color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;font-weight:300;letter-spacing:1px}
.nav{display:flex;gap:3px;margin-left:auto;flex-wrap:wrap}
.nav-btn{background:none;border:none;color:var(--muted);padding:7px 13px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.nav-btn:hover{background:var(--border);color:var(--text)}
.nav-btn.active{background:var(--red);color:white}
.badge{background:var(--red);color:white;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:600}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(10,10,10,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding-bottom:var(--safe-bottom)}
.mobile-nav-inner{display:flex;align-items:stretch;height:var(--nav-h)}
.mnav-btn{flex:1;background:none;border:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;padding:8px 4px;transition:color .15s;position:relative}
.mnav-btn.active{color:var(--red)}
.mnav-btn .micon{font-size:22px;line-height:1}
.mnav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:white;border-radius:10px;padding:1px 5px;font-size:9px;font-weight:700;min-width:16px;text-align:center}
.main{padding:24px 20px;max-width:1200px;margin:0 auto}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;margin-bottom:4px}
.section-sub{color:var(--muted);font-size:13px;margin-bottom:22px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;display:flex;align-items:center;gap:12px}
.stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.si-red{background:rgba(195,0,47,.15)}.si-green{background:rgba(34,197,94,.15)}.si-yellow{background:rgba(245,158,11,.15)}

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
let SCRIPT_URL = localStorage.getItem('nissan_vo_script_url') || 'https://script.google.com/macros/s/AKfycbxZZ80nAotc46GStwvL_2cASI9lmqgmfhgFJl_aUPV3uWwtTtcoXQMS4NADsv8qhJEptQ/exec';
let SHEETS_CONECTADO = false;

// ── DATA ──────────────────────────────────────────────────────────────────────
let STOCK = [{
  id: 'demo-001',
  matricula: '1234 ABC',
  marca: 'Nissan',
  modelo: 'Qashqai',
  version: 'N-Connecta 1.3 DIG-T 140cv',
  año: 2022,
  km: 32000,
  precio: 20900,
  precioBase: 20900,
  color: 'Gris',
  combustible: 'Gasolina',
  cambio: 'Manual',
  etiqueta: 'C',
  foto: '🚗',
  isNew: false,
  procedencia: 'VO',
  fecMat: '03/2022',
  impFinanciar: 8000,
}];
let CLIENTES = [];
let ALERTAS = [];
let UBICACIONES = {}; // id -> zona (Expo|Playa|Terraza|-2)
let currentTab = 'dashboard';

// ── GOOGLE SHEETS API ─────────────────────────────────────────────────────────
async function apiCall(action, data) {
  if (!SCRIPT_URL) throw new Error('Sin URL configurada');
  const body = JSON.stringify(Object.assign({action}, data||{}));
  // Usar POST para payloads grandes (replaceStock con 100+ vehículos)
  // Apps Script acepta POST via doPost(e) con e.postData.contents
  // Para acciones pequeñas también funciona GET como fallback
  let res, txt;
  try {
    res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain'},
      body: body
    });
    txt = await res.text();
  } catch(e) {
    // Fallback a GET para acciones simples si POST falla (CORS preflight)
    const payload = encodeURIComponent(body);
    res = await fetch(SCRIPT_URL + '?d=' + payload);
    txt = await res.text();
  }
  if (txt.trim().startsWith('<')) throw new Error('Respuesta HTML — verifica la implementación del script');
  const json = JSON.parse(txt);
  if (json.error) throw new Error(json.error);
  return json;
}

function parseCliente(row) {
  function safe(v, fb) { try { return v ? JSON.parse(v) : fb; } catch(e) { return fb; } }
  return {
    id:row.id, nombre:row.nombre, telefono:row.telefono,
    email:row.email, estado:row.estado||'Activo',
    fechaCreacion:row.fechaCreacion||'',
    pref:{
      pMin:parseInt(row.pMin)||0, pMax:parseInt(row.pMax)||50000,
      modelos:safe(row.modelos,[]), acabado:row.acabado||null, comb:safe(row.comb,[]),
      cambio:row.cambio||'Cualquiera', kmMax:parseInt(row.kmMax)||150000,
      añoMin:parseInt(row.añoMin)||2018, etiq:safe(row.etiq,[]),
      notas:row.notas||''
    }
  };
}

function parseStock(row) {
  return {
    id:row.id, matricula:row.matricula||'', marca:row.marca||'Nissan',
    modelo:row.modelo||'', version:row.version||'',
    año:parseInt(row.año)||0, km:parseInt(row.km)||0,
    precio:parseInt(row.precio)||0, precioBase:parseInt(row.precioContado)||parseInt(row.precioBase)||0,
    color:row.color||'',
    combustible:normCombustible(row.combustible||'', row.modelo||'', row.version||''),
    cambio:row.cambio||'', etiqueta:row.etiqueta||'',
    foto:row.foto||'🚗', isNew:row.isNew==='SI', estado:row.estado||'',
    procedencia:String(row.procedencia||'').toUpperCase(),
    fecMat:parseFecha(row.fecMat).str||row.fecMat||'', tipo:row.tipo||'', impFinanciar:parseInt(String(row.impFinanciar||'0').replace(/[^0-9]/g,''))||0
  };
}

async function cargarDatos() {
  if (!SCRIPT_URL) return false;
  try {
    showLoadingBanner('Conectando con Google Sheets...');
    const res = await apiCall('getAll');
    CLIENTES = (res.clientes||[]).filter(r=>r.id).map(parseCliente);
    STOCK = (res.stock||[]).filter(r=>r.id).map(parseStock);
    // Cargar ubicaciones
    if (res.ubicaciones) {
      UBICACIONES = {};
      res.ubicaciones.forEach(function(r){ if(r.id && r.zona) UBICACIONES[r.id]=r.zona; });
    }
    SHEETS_CONECTADO = true;
    hideLoadingBanner();
    return true;
  } catch(e) {
    hideLoadingBanner();
    console.error('Error Sheets:', e);
    return false;
  }
}

async function syncCliente(c) {
  if (!SCRIPT_URL) return;
  try { await apiCall('saveCliente', {data:c}); } catch(e) { console.error(e); }
}
async function syncStock(v) {
  if (!SCRIPT_URL) return;
  const d=Object.assign({},v,{precioContado:v.precioBase||0});
  try { await apiCall('saveStock', {data:d}); } catch(e) { console.error(e); }
}
async function syncStockMasivo(rows) {
  if (!SCRIPT_URL) return;
  const mapped=rows.map(function(v){return Object.assign({},v,{precioContado:v.precioBase||0,procedencia:v.procedencia||''});});
  console.log('SYNC impFinanciar muestra:', mapped.slice(0,3).map(function(v){return v.matricula+' → '+v.impFinanciar;}));
  try { await apiCall('replaceStock', {data:mapped}); } catch(e) { console.error(e); }
}

async function setUbicacion(id, zona, btn) {
  // Toggle: si ya está activa, desasignar
  if (UBICACIONES[id] === zona) {
    delete UBICACIONES[id];
    zona = '';
  } else {
    UBICACIONES[id] = zona;
  }
  // Actualizar botones en la tarjeta sin re-renderizar todo
  const card = btn.closest('.vcard');
  if (card) {
    card.querySelectorAll('button[onclick*="setUbicacion"]').forEach(function(b) {
      // Extraer la zona del atributo onclick: setUbicacion('id','Expo',this)
      const m = b.getAttribute('onclick').match(/setUbicacion\('[^']+','([^']+)'/);
      const bZona = m ? m[1] : '';
      const act = UBICACIONES[id] === bZona;
      b.style.border = '1px solid ' + (act ? 'var(--red)' : 'var(--border)');
      b.style.background = act ? 'rgba(195,0,47,.15)' : 'var(--mid)';
      b.style.color = act ? 'var(--red)' : 'var(--muted)';
    });
  }
  // Sync a Sheets
  if (SCRIPT_URL) {
    try {
      await apiCall('saveUbicacion', {data: {id: id, zona: zona}});
    } catch(e) { console.error('Error guardando ubicación:', e); }
  }
}

// ── NORMALIZACIÓN DE MODELOS ─────────────────────────────────────────────────
// Mapea variantes del Excel al nombre canónico del selector de clientes
const MODELO_NORMALIZE = {
  'NEW QASHQAI':'Qashqai', 'NEW QASHQAI J12':'Qashqai', 'QASHQAI':'Qashqai',
  'NEW JUKE':'Juke',       'JUKE':'Juke',
  'NEW XTRAIL':'X-Trail',  'NEW X-TRAIL':'X-Trail', 'X-TRAIL':'X-Trail', 'XTRAIL':'X-Trail',
  'NEW MICRA':'Micra',     'MICRA':'Micra', 'MICRA EV':'Micra',
  'LEAF':'Leaf',
  'NAVARA':'Navara',       'NP300':'Navara',
  'ARIYA':'Ariya',
  'NEW ARIYA':'Ariya',
  'TOWNSTAR':'Townstar',
  'PRIMASTAR':'Primastar',
  'NV300':'NV300',
};

function normalizarModelo(modelo) {
  const key = String(modelo||'').toUpperCase().trim();
  // Buscar coincidencia exacta primero
  for(const [k,v] of Object.entries(MODELO_NORMALIZE)){
    if(k.toUpperCase() === key) return v;
  }
  // Buscar si contiene alguna clave
  for(const [k,v] of Object.entries(MODELO_NORMALIZE)){
    if(key.includes(k.toUpperCase())) return v;
  }
  return modelo; // devolver tal cual si no se reconoce
}

// ── JERARQUÍA DE ACABADOS ────────────────────────────────────────────────────
// Orden de menor a mayor equipamiento. Un cliente que pide N-Connecta acepta
// N-Connecta y cualquier acabado superior, pero no Acenta.
const ACABADOS_JERARQUIA = {
  'Qashqai': ['ACENTA','N-CONNECTA','N-DESIGN','TEKNA','TEKNA+','TEKNA PREMIUM'],
  'Juke':    ['ACENTA','N-CONNECTA','N-DESIGN','TEKNA'],
  'X-Trail': ['ACENTA','N-CONNECTA','TEKNA'],
  'Micra':   ['ACENTA','N-CONNECTA','N-DESIGN','N-SPORT','TEKNA'],
  'Leaf':    ['ACENTA','N-CONNECTA','TEKNA'],
};

// Extrae el acabado de una cadena de versión
function detectarAcabado(version) {
  const v = String(version||'').toUpperCase();
  // Orden importa: buscar los más específicos primero
  const keywords = [
    'TEKNA+','TEKNA PREMIUM','TEKNA','N-DESIGN','NDESIGN','N-DESIGN BLACK',
    'N-CONNECTA','NCONNECTA','N-SPORT','NSPORT','ACENTA',
    'PREMIÈRE','PREMIERE',
    'KIIRO',     // Edición especial Micra ≈ N-Design
    'ENIGMA',    // Edición especial ≈ Tekna
    'XTRONIC',   // CVT sin acabado explícito → ignorar
  ];
  // Mapeo de ediciones especiales a acabados estándar
  const ESPECIALES = {
    'KIIRO':'N-DESIGN', 'ENIGMA':'TEKNA', 'N-DESIGN BLACK':'N-DESIGN'
  };
  for(const kw of keywords){
    if(v.includes(kw)){
      if(ESPECIALES[kw]) return ESPECIALES[kw];
      if(kw==='NCONNECTA'||kw==='N-CONNECTA') return 'N-CONNECTA';
      if(kw==='NDESIGN'||kw==='N-DESIGN'||kw==='N-DESIGN BLACK') return 'N-DESIGN';
      if(kw==='NSPORT'||kw==='N-SPORT') return 'N-SPORT';
      if(kw==='PREMIÈRE'||kw==='PREMIERE') return 'TEKNA';
      if(kw==='XTRONIC') return null; // no es acabado
      return kw;
    }
  }
  return null;
}

// Devuelve true si el acabado del vehículo es >= al acabado mínimo deseado
function acabadoCompatible(modelo, versionVehiculo, acabadoMinimo) {
  if(!acabadoMinimo) return true; // sin preferencia → cualquiera vale
  const modeloNorm = normalizarModelo(modelo);
  const jerarquia = ACABADOS_JERARQUIA[modeloNorm] || null;
  if(!jerarquia) return true; // modelo sin jerarquía definida → no filtrar
  const acabadoVeh = detectarAcabado(versionVehiculo);
  if(!acabadoVeh) return true; // versión no reconocida → dejar pasar
  const idxMin = jerarquia.indexOf(acabadoMinimo.toUpperCase());
  const idxVeh = jerarquia.indexOf(acabadoVeh.toUpperCase());
  if(idxMin < 0) return true; // acabado mínimo no en jerarquía → no filtrar
  if(idxVeh < 0) return true; // acabado vehículo no reconocido → dejar pasar
  return idxVeh >= idxMin;    // el vehículo es igual o superior
}

// ── MATCHING ──────────────────────────────────────────────────────────────────
function calcMatch(cli, veh) {
  const p = cli.pref;
  const MARGEN = 2000; // margen máximo sobre presupuesto
  let score=0, ok=[], bad=[];

  // ── FILTROS OBLIGATORIOS — si falla alguno, score=0 directamente ──────────

  // Normalizar el modelo del vehículo para comparar con preferencias del cliente
  const modeloNorm = normalizarModelo(veh.modelo);

  // 1. Modelo obligatorio (si el cliente tiene preferencia de modelo)
  if(p.modelos.length > 0 && !p.modelos.includes(modeloNorm)){
    return {score:0, ok:[], bad:['✗ Modelo no coincide ('+veh.modelo+')'], descartar:true};
  }

  // 1b. Acabado mínimo obligatorio (si el cliente especifica acabado)
  if(p.acabado && p.modelos.length > 0){
    if(!acabadoCompatible(veh.modelo, veh.version, p.acabado)){
      const acabadoVeh = detectarAcabado(veh.version)||'desconocido';
      return {score:0, ok:[], bad:['✗ Acabado '+acabadoVeh+' inferior al deseado ('+p.acabado+')'], descartar:true};
    }
  }

  // 2. Presupuesto obligatorio con margen de 2.000€
  if(veh.precio > p.pMax + MARGEN){
    return {score:0, ok:[], bad:['✗ Precio '+veh.precio.toLocaleString()+'€ supera presupuesto+margen ('+(p.pMax+MARGEN).toLocaleString()+'€)'], descartar:true};
  }

  // 3. Año mínimo obligatorio
  if(veh.año && p.añoMin && veh.año < p.añoMin){
    return {score:0, ok:[], bad:['✗ Año '+veh.año+' anterior al mínimo ('+p.añoMin+')'], descartar:true};
  }

  // ── PUNTUACIÓN del resto de criterios ────────────────────────────────────

  // Precio (35 pts)
  if(veh.precio >= p.pMin && veh.precio <= p.pMax){
    score+=35; ok.push('✓ Precio dentro del presupuesto');
  } else if(veh.precio < p.pMin){
    score+=25; ok.push('✓ Por debajo del presupuesto');
  } else {
    // Entre pMax y pMax+2000
    const exceso = veh.precio - p.pMax;
    score+=15;
    bad.push('⚠ '+exceso.toLocaleString()+'€ sobre presupuesto (dentro del margen)');
  }

  // Modelo (ya pasó el filtro obligatorio)
  if(p.modelos.length === 0){
    score+=20; ok.push('✓ Sin preferencia de modelo');
  } else {
    score+=20; ok.push('✓ Modelo deseado ('+modeloNorm+')');
  }

  // Año (ya pasó el filtro, sumar puntos)
  score+=10; ok.push('✓ Año OK ('+veh.año+')');

  // Combustible (15 pts)
  if(p.comb.length===0 || p.comb.includes(veh.combustible)){
    score+=15; ok.push('✓ Combustible OK ('+veh.combustible+')');
  } else {
    bad.push('✗ Combustible no deseado ('+veh.combustible+')');
  }

  // Km (10 pts)
  if(!p.kmMax || veh.km <= p.kmMax){
    score+=10; ok.push('✓ Km OK ('+veh.km.toLocaleString()+')');
  } else {
    bad.push('✗ Excede km máx ('+veh.km.toLocaleString()+' > '+p.kmMax.toLocaleString()+')');
  }

  // Cambio (5 pts)
  if(p.cambio==='Cualquiera' || p.cambio===veh.cambio){
    score+=5; ok.push('✓ Cambio compatible');
  } else {
    bad.push('✗ Prefiere '+p.cambio+' (es '+veh.cambio+')');
  }

  // Etiqueta DGT (5 pts bonus)
  if(p.etiq.length>0 && p.etiq.includes(veh.etiqueta)){
    score+=5; ok.push('✓ Etiqueta '+veh.etiqueta);
  }

  // Acabado (info en la alerta, sin puntos extra — ya es filtro obligatorio)
  if(p.acabado){
    const acabadoVeh = detectarAcabado(veh.version);
    if(acabadoVeh) ok.push('✓ Acabado: '+acabadoVeh);
  } else {
    const acabadoVeh = detectarAcabado(veh.version);
    if(acabadoVeh) ok.push('ℹ Acabado: '+acabadoVeh);
  }

  return {score:Math.min(score,100), ok, bad};
}

function buildAlertas(){
  ALERTAS=[];
  for(const v of STOCK) for(const c of CLIENTES){
    if(c.estado!=='Activo') continue;

  }
  ALERTAS.sort((a,b)=>b.m.score-a.m.score);
  updateBadges();
}

// ── EXCEL HELPERS ─────────────────────────────────────────────────────────────
function clean(v){ return String(v||'').replace(/\xa0/g,' ').replace(/  +/g,' ').trim(); }
function safeInt(v){
  try{
    if(v===null||v===undefined||v==='') return 0;
    if(typeof v==='number') return Math.round(v);
    var s=String(v).trim().replace(/[€$\s]/g,'');
    if(/^-?\d{1,3}(\.\d{3})+(,\d+)?$/.test(s)){ s=s.replace(/\./g,'').replace(',','.'); }
    else if(/^-?\d+(,\d{1,2})$/.test(s)){ s=s.replace(',','.'); }
    else if(/^-?\d{1,3}(,\d{3})+(\.\d+)?$/.test(s)){ s=s.replace(/,/g,''); }
    else{ s=s.replace(/[^\d.]/g,''); }
    return Math.round(parseFloat(s))||0;
  }catch(e){ return 0; }
}
function safeYear(v){
  if(!v) return 0;
  if(v instanceof Date) return v.getFullYear();
  const s=String(v); const m=s.match(/(\d{4})/); return m?parseInt(m[1]):0;
}
function parseFecha(v){
  if(!v) return {str:'',año:0};
  // Si es objeto Date nativo de JS (raw:true)
  if(v instanceof Date){
    if(isNaN(v.getTime())) return {str:'',año:0};
    var d=v.getUTCDate(), mo=v.getUTCMonth()+1, yr=v.getUTCFullYear();
    return {str:('0'+d).slice(-2)+'-'+('0'+mo).slice(-2)+'-'+yr, año:yr};
  }
  var s=String(v).trim();
  // ISO con zona horaria: "2018-06-21T22:00:00.000Z" → extraer solo fecha UTC
  if(s.includes('T')){
    var isoMatch=s.match(/^(\d{4})-(\d{2})-(\d{2})T/);
    if(isoMatch) return {str:isoMatch[3]+'-'+isoMatch[2]+'-'+isoMatch[1], año:parseInt(isoMatch[1])};
  }
  // M/D/YY o M/D/YYYY (SheetJS con raw:false)
  var mdy=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(mdy){
    var mo=parseInt(mdy[1]),dy=parseInt(mdy[2]),yr=parseInt(mdy[3]);
    if(yr<100) yr+=2000;
    return {str:('0'+dy).slice(-2)+'-'+('0'+mo).slice(-2)+'-'+yr, año:yr};
  }
  // DD/MM/YYYY o DD-MM-YYYY (formato europeo directo)
  var dmy=s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
  if(dmy){
    var dy=parseInt(dmy[1]),mo=parseInt(dmy[2]),yr=parseInt(dmy[3]);
    return {str:('0'+dy).slice(-2)+'-'+('0'+mo).slice(-2)+'-'+yr, año:yr};
  }
  // yyyy-mm-dd
  var iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso) return {str:iso[3]+'-'+iso[2]+'-'+iso[1], año:parseInt(iso[1])};
  // solo año
  var soloAño=s.match(/^(\d{4})$/);
  if(soloAño) return {str:'', año:parseInt(soloAño[1])};
  return {str:'',año:0};
}
function normCambio(t){ const s=String(t||'').toUpperCase(); return (s.includes('AUTO')||s.includes('CVT')||s.includes('DCT'))?'Automático':'Manual'; }
function normCombustible(c, modelo, version){
  const s=String(c||'').toUpperCase();
  const v=String(version||'').toUpperCase();
  const m=String(modelo||'').toUpperCase();

  // ePOWER en Qashqai = Híbrido real
  if(s==='EPOWER'||s==='E-POWER'||v.includes('E-POWER')||v.includes('EPOWER')) return 'Híbrido';

  // HYBRIDO en Qashqai = mHEV 12V = básicamente Gasolina
  if((s.includes('HYBRIDO')||s.includes('HÍBRIDO')||s.includes('HYBRID'))
     && m.includes('QASHQAI')
     && !v.includes('E-POWER') && !v.includes('EPOWER')) return 'Gasolina';

  if(s.includes('ELECTR')) return 'Eléctrico';
  if(s.includes('HIBRIDO')||s.includes('HÍBRIDO')||s.includes('HYBRID')) return 'Híbrido';
  if(s.includes('DIESEL')||s.includes('DIÉSEL')) return 'Diésel';
  return 'Gasolina';
}
function inferEtiq(comb, dist){
  const d=String(dist||'').trim().toUpperCase();
  if(d==='0'||d==='CERO') return '0';
  if(d==='ECO') return 'ECO';
  if(d==='C') return 'C';
  if(d==='B') return 'B';
  const c=String(comb||'').toUpperCase();
  if(c.includes('ELECTR')) return '0';
  if(c.includes('HIBRIDO')||c.includes('HÍBRIDO')||c.includes('HYBRID')) return 'ECO';
  if(c.includes('GASOLINA')) return 'ECO';
  return 'B';
}
function inferFoto(m,c){
  const mm=String(m||'').toUpperCase(), cc=String(c||'').toUpperCase();
  if(cc.includes('ELECTR')||mm.includes('MICRA EV')||mm.includes('LEAF')||mm.includes('ARIYA')) return '⚡';
  if(mm.includes('NAVARA')||mm.includes('NP300')) return '🚚';
  if(mm.includes('X-TRAIL')||mm.includes('XTRAIL')||mm.includes('QASHQAI')) return '🚙';
  return '🚗';
}

function procesarRows(rows, mapeo){
  const g=(campo,row)=>mapeo[campo]?row[mapeo[campo]]:null;
  return rows.map(function(row,i){
    const comb=String(g('combustible',row)||'Gasolina');
    const mod=String(g('modelo',row)||'');
    return {
      id:'X'+Date.now()+i,
      matricula:String(g('matricula',row)||'').toUpperCase(),
      marca:String(g('marca',row)||'Nissan'),
      modelo:mod, version:String(g('version',row)||''),
      año:parseInt(g('año',row))||new Date().getFullYear(),
      km:safeInt(String(g('km',row)||'0')),
      precio:safeInt(String(g('precio',row)||'0')),
      precioBase:0,
      color:String(g('color',row)||''), combustible:normCombustible(comb),
      cambio:String(g('cambio',row)||'Manual'),
      etiqueta:g('etiqueta',row)?String(g('etiqueta',row)):inferEtiq(comb,null),
      foto:inferFoto(mod,comb), isNew:true
    };
  }).filter(function(v){ return v.precio>0||v.modelo; });
}

// Cálculo cuota: préstamo = precio * (1 + comision_apertura), TIN 9.99%, 96 meses
// Fórmula cuota mensual: C = P * r / (1 - (1+r)^-n)
function calcularCuota(precioVehiculo, entrada) {
  const comisionApertura = 0.0395;
  const TIN = 0.0999;
  const meses = 96;
  const prestamo = (precioVehiculo - entrada) * (1 + comisionApertura);
  const r = TIN / 12;
  const cuota = prestamo * r / (1 - Math.pow(1 + r, -meses));
  return Math.round(cuota);
}

function actualizarPrecioFinanciado() {
  const v = STOCK.find(s => s.id === cartelState.vehiculoId);
  if (!v) return;
  const extra = cartelState.cambioNombre ? (cartelState.cambioNombreImporte || 0) : 0;
  const precioTotal = v.precio + extra;
  const impFinanciar = v.impFinanciar || 0;
  const entradaMax = impFinanciar > 0
    ? Math.max(0, precioTotal - impFinanciar)
    : Math.floor(precioTotal * 0.5);
  // Ajustar entrada si supera el nuevo máximo
  if (cartelState.entrada > entradaMax) cartelState.entrada = entradaMax;
  const cuota = calcularCuota(precioTotal, cartelState.entrada);
  const fmt = n => Number(n).toLocaleString('es-ES', {minimumFractionDigits:0, useGrouping:true});
  // Actualizar slider
  const slider = document.querySelector('input[type="range"]');
  if (slider) { slider.max = entradaMax; slider.value = cartelState.entrada; }
  const maxLbl = document.getElementById('entrada-max-lbl');
  if (maxLbl) maxLbl.textContent = fmt(entradaMax) + ' €';
  // Actualizar cartel
  const elPrecio = document.getElementById('cartel-precio');
  const elCuota = document.getElementById('cartel-cuota');
  const elEntrada = document.getElementById('cartel-entrada');
  const elLbl = document.getElementById('entrada-label');
  if (elPrecio) elPrecio.textContent = fmt(precioTotal) + '€';
  if (elCuota) elCuota.textContent = fmt(cuota) + '€';
  if (elEntrada) elEntrada.textContent = fmt(cartelState.entrada) + '€';
  if (elLbl) elLbl.textContent = fmt(cartelState.entrada) + ' €';
}

function actualizarCartelNumeros(entradaVal) {
  entradaVal = parseInt(entradaVal);
  cartelState.entrada = entradaVal;
  const v = STOCK.find(s => s.id === cartelState.vehiculoId);
  if (!v) return;
  const extra = cartelState.cambioNombre ? (cartelState.cambioNombreImporte || 0) : 0;
  const cuota = calcularCuota(v.precio + extra, entradaVal);
  const fmt = n => Number(n).toLocaleString('es-ES', {minimumFractionDigits:0, useGrouping:true});
  // Actualizar label de entrada
  const lbl = document.getElementById('entrada-label');
  if (lbl) lbl.textContent = entradaVal.toLocaleString() + ' €';
  // Actualizar números en el cartel
  const elCuota = document.getElementById('cartel-cuota');
  const elEntrada = document.getElementById('cartel-entrada');
  if (elCuota) elCuota.textContent = fmt(cuota) + '€';
  if (elEntrada) elEntrada.textContent = fmt(entradaVal) + '€';
}

function renderCarteles() {
  const el = document.getElementById('tab-carteles');
  if (!el) return;
  
  const v = STOCK.find(s => s.id === cartelState.vehiculoId) || null;
  const precioVeh = v ? v.precio : 0;
  const entradaMax = v ? Math.floor(precioVeh * 0.5) : 10000;
  const entradaVal = Math.min(cartelState.entrada, entradaMax);
  const cuota = v ? calcularCuota(precioVeh, entradaVal) : 0;
  const financiado = v ? precioVeh : 0;

  el.innerHTML =
    '<div class="flex ac jb mb3">' +
      '<div class="section-title">CARTELES DE PRECIO</div>' +
    '</div>' +
    '<div class="card" style="padding:16px;margin-bottom:16px">' +
      '<label style="display:block;margin-bottom:6px;font-weight:600">Vehículo</label>' +
      '<select onchange="cartelState.vehiculoId=this.value;cartelState.entrada=0;renderCarteles()" style="width:100%">' +
        '<option value="">— Selecciona un vehículo —</option>' +
        STOCK.map(s => '<option value="' + s.id + '"' + (cartelState.vehiculoId === s.id ? ' selected' : '') + '>' + s.matricula + ' · ' + s.modelo + ' · ' + s.precio.toLocaleString() + '€</option>').join('') +
      '</select>' +
    '</div>' +
    (v ? 
      '<div class="card" style="padding:16px;margin-bottom:16px">' +
        '<label style="display:block;margin-bottom:6px;font-weight:600">Entrada: <span id="entrada-label" style="color:var(--red);font-size:18px">' + entradaVal.toLocaleString() + ' €</span></label>' +
        '<input type="range" min="0" max="' + entradaMax + '" step="100" value="' + entradaVal + '" ' +
          'oninput="actualizarCartelNumeros(this.value)" onchange="cartelState.entrada=parseInt(this.value)" ' +
          'style="width:100%;accent-color:var(--red);margin-bottom:8px">' +
        '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)">' +
          '<span>0 €</span><span>' + entradaMax.toLocaleString() + ' €</span>' +
        '</div>' +
      '</div>' +
      '<div class="card" style="padding:16px;margin-bottom:16px">' +
        '<label style="display:block;margin-bottom:8px;font-weight:600">Email destinatario</label>' +
        '<select onchange="cartelState.emailDest=this.value;renderCarteles()" style="width:100%;margin-bottom:10px">' +
          COMPANYEROS.map(c => '<option value="' + c.email + '"' + (cartelState.emailDest === c.email ? ' selected' : '') + '>' + c.nombre + ' (' + c.email + ')</option>').join('') +
        '</select>' +
      '</div>' +
      // Preview del cartel
      '<div style="margin-bottom:16px">' +
        '<div style="font-weight:600;margin-bottom:8px;font-size:13px;color:var(--muted)">VISTA PREVIA</div>' +
        cartelPreviewHtml(v, entradaVal, cuota, financiado) +
      '</div>' +
      '<div style="display:flex;gap:10px">' +
        '<button class="btn w100" onclick="generarCartelPDF(\'' + v.id + '\',cartelState.entrada)">⬇️ Descargar PDF</button>' +
        '<button class="btn sec w100" onclick="enviarCartelEmail(\'' + v.id + '\',' + entradaVal + ')">📧 Enviar por email</button>' +
      '</div>'
    : '') +
  '';
}

async function generarCartelPDF(vehiculoId, entrada) {
  const v = STOCK.find(s => s.id === vehiculoId);
  if (!v) return;

  const btn = document.querySelector('[onclick*="generarCartelPDF"]');
  if (btn) { btn.textContent = '⏳ Generando PDF...'; btn.disabled = true; }

  try {
    const cartelEl = document.getElementById('cartel-preview');
    if (!cartelEl) { alert('No se encontró el cartel'); return; }

    const canvas = await html2canvas(cartelEl, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
    const imgData = canvas.toDataURL('image/jpeg', 0.92);

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    pdf.addImage(imgData, 'JPEG', 0, 0, pageW, pageH);
    pdf.save(`cartel_${v.matricula}.pdf`);
  } catch(e) {
    alert('Error generando PDF: ' + e.message);
  } finally {
    if (btn) { btn.textContent = '⬇️ Descargar PDF'; btn.disabled = false; }
  }
}

async function enviarCartelEmail(vehiculoId, entrada) {
  const v = STOCK.find(s => s.id === vehiculoId);
  if (!v) return;
  if (!SCRIPT_URL) { alert('Conecta Google Sheets para enviar emails'); return; }

  const dest = cartelState.emailDest;
  const btn = document.querySelector('[onclick*="enviarCartelEmail"]');
  if (btn) { btn.textContent = '⏳ Generando PDF...'; btn.disabled = true; }

  try {
    // Capturar el cartel como imagen con html2canvas
    const cartelEl = document.getElementById('cartel-preview');
    if (!cartelEl) { alert('No se encontró el cartel'); return; }

    const canvas = await html2canvas(cartelEl, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
    const imgData = canvas.toDataURL('image/jpeg', 0.92);

    // Convertir a PDF con jsPDF (A4 landscape)
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    pdf.addImage(imgData, 'JPEG', 0, 0, pageW, pageH);
    const pdfBase64 = pdf.output('datauristring').split(',')[1];

    if (btn) btn.textContent = '⏳ Enviando...';

    const res = await apiCall('enviarCartel', {
      data: {
        email: dest,
        matricula: v.matricula,
        modelo: v.modelo,
        pdfBase64: pdfBase64
      }
    });
    if (res.ok) {
      alert('✅ Cartel enviado a ' + dest);
    } else {
      alert('Error: ' + (res.error || 'desconocido'));
    }
  } catch(e) {
    alert('Error enviando: ' + e.message);
  } finally {
    if (btn) { btn.textContent = '📧 Enviar por email'; btn.disabled = false; }
  }
}

function renderAlertas(){
  function safeStr(v){ return String(v||''); }
  function safeNum(v){ return parseInt(v)||0; }

  function aHtml(a){
    try{
      const vid = safeStr(a.v&&a.v.id);
      const cid = safeStr(a.c&&a.c.id);
      const aid = vid+'-'+cid;
      const foto = safeStr((a.v&&a.v.foto)||'🚗');
      const modelo = safeStr((a.v&&a.v.modelo)||'');
      const version = safeStr((a.v&&a.v.version)||'');
      const anio = safeStr((a.v&&a.v.año)||'');
      const precio = safeNum(a.v&&a.v.precio);
      const mat = safeStr((a.v&&a.v.matricula)||'');
      const nombre = safeStr((a.c&&a.c.nombre)||'');
      const tel = safeStr((a.c&&a.c.telefono)||'');
      const score = safeNum(a.m&&a.m.score);

function copyMsg(id){
  const a=ALERTAS.find(function(x){return x.id===id;});
  if(!a||!a.msg) return;
  navigator.clipboard&&navigator.clipboard.writeText(a.msg);
  const btn=document.getElementById('copybtn-'+id);
  if(btn){
    const prev=btn.innerHTML;
    btn.style.background='var(--green)'; btn.style.color='#000';
    btn.innerHTML='<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
    setTimeout(function(){ btn.style.background='var(--border)'; btn.style.color='var(--text)'; btn.innerHTML=prev; }, 2000);
  }
}
function abrirWhatsApp(btn){
  const aid = btn.dataset.aid;
  const base = btn.dataset.wa;
  const alerta = ALERTAS.find(function(a){ return a.id === aid; });
  const msg = alerta && alerta.msg ? alerta.msg : '';
  const url = msg ? base+'?text='+encodeURIComponent(msg) : base;
  window.open(url, '_blank');
}
function llamar(tel){
  window.location.href='tel:'+String(tel||'').replace(/\s/g,'');
}

// ── LOAD MSGS ─────────────────────────────────────────────────────────────────
async function loadMsgs(){
  for(const a of ALERTAS.slice(0,8)){
    const msg=await genMsg(a);
    a.msg=msg; a.loading=false;
    ['','2'].forEach(function(sfx){
      const el=document.getElementById('msg'+sfx+'-'+a.id);
      if(el) el.innerHTML='💬 '+msg;
    });
    // Update WhatsApp link with message text
    const waBtn=document.getElementById('wabtn-'+a.id);
    if(waBtn){
      const tel=(a.c.telefono||'').replace(/[^0-9]/g,'');
      const num=tel.startsWith('34')?tel:'34'+tel;
      waBtn.href='https://wa.me/'+num+'?text='+encodeURIComponent(msg);
    }
  }
}

const MODELOS_LIST=['Micra','Juke','Qashqai','X-Trail','Leaf','Navara','Ariya','Z'];
const COMB_LIST=['Gasolina','Diésel','Híbrido','Eléctrico'];
const ETIQ_LIST=['0','ECO','C','B'];
let selModelos=[],selComb=[],selEtiq=[],selAcabado=null;

function editarCliente(id){
  const cli = CLIENTES.find(function(x){ return x.id===id; });
  if(!cli) return;
  // Pre-cargar selecciones
  selModelos = [...(cli.pref.modelos||[])];
  selComb    = [...(cli.pref.comb||[])];
  selEtiq    = [...(cli.pref.etiq||[])];
  selAcabado = cli.pref.acabado||null;

  // Reutilizar el mismo formulario de openAddCliente
  openAddCliente();

  // Después de renderizar, rellenar los campos con los datos actuales
  setTimeout(function(){
    const cn   = document.getElementById('cn');   if(cn)   cn.value   = cli.nombre||'';
    const ct   = document.getElementById('ct');   if(ct)   ct.value   = cli.telefono||'';
    const ce   = document.getElementById('ce');   if(ce)   ce.value   = cli.email||'';
    const cpm  = document.getElementById('cpm');  if(cpm)  cpm.value  = cli.pref.pMin||'';
    const cpx  = document.getElementById('cpx');  if(cpx)  cpx.value  = cli.pref.pMax||'';
    const ckm  = document.getElementById('ckm');  if(ckm)  ckm.value  = cli.pref.kmMax||'';
    const cay  = document.getElementById('cay');  if(cay)  cay.value  = cli.pref.añoMin||'';
    const cnot = document.getElementById('cnot'); if(cnot) cnot.value = cli.pref.notas||'';
    const ccam = document.getElementById('ccam');
    if(ccam) ccam.value = cli.pref.cambio||'Cualquiera';

    // Marcar chips de modelos
    document.querySelectorAll('#chips-mod .chip').forEach(function(ch){
      if(selModelos.includes(ch.dataset.val)) ch.classList.add('on');
    });
    // Marcar chips de combustible
    document.querySelectorAll('#chips-comb .chip').forEach(function(ch){
      if(selComb.includes(ch.dataset.val)) ch.classList.add('on');
    });
    // Marcar chips de etiqueta
    document.querySelectorAll('#chips-acabado').length && actualizarChipsAcabado();
    document.querySelectorAll('[id^="chips-"] .chip').forEach(function(ch){
      if(ch.closest('#chips-mod')||ch.closest('#chips-comb')) return;
      if(selEtiq.includes(ch.dataset.val)) ch.classList.add('on');
    });

    // Cambiar título y botón guardar para modo edición
    const titulo = document.querySelector('.mtitle');
    if(titulo) titulo.textContent = '✏️ EDITAR CLIENTE';
    const btnGuardar = document.querySelector('button[onclick="saveCliente()"]');
    if(btnGuardar){
      btnGuardar.setAttribute('data-edit-id', id);
      btnGuardar.setAttribute('onclick', 'guardarEdicionCliente("'+id+'")');
      btnGuardar.textContent = '✓ Guardar cambios';
    }
  }, 50);
}

function guardarEdicionCliente(id){
  const nombre = document.getElementById('cn').value.trim();
  if(!nombre) return;
  const idx = CLIENTES.findIndex(function(x){ return x.id===id; });
  if(idx<0) return;

  // Mantener id y fechaCreacion originales
  const original = CLIENTES[idx];
  const actualizado = {
    id: original.id,
    nombre,
    telefono: document.getElementById('ct').value,
    email:    document.getElementById('ce').value,
    estado:   original.estado||'Activo',
    fechaCreacion: original.fechaCreacion||'',
    pref:{
      pMin:    parseInt(document.getElementById('cpm').value)||0,
      pMax:    parseInt(document.getElementById('cpx').value)||50000,
      modelos: [...selModelos],
      acabado: selAcabado||null,
      comb:    selComb.length?[...selComb]:[...COMB_LIST],
      cambio:  document.getElementById('ccam').value,
      kmMax:   parseInt(document.getElementById('ckm').value)||150000,
      añoMin:  parseInt(document.getElementById('cay').value)||2018,
      etiq:    [...selEtiq],
      notas:   document.getElementById('cnot').value
    }
  };

  CLIENTES[idx] = actualizado;
  closeModal(); buildAlertas(); loadMsgs(); renderTab(currentTab);
  syncCliente(actualizado).then(function(){ showSyncOk('Cliente actualizado en Sheets ✓'); });
}

function togChipAcabado(el){
  selAcabado = (selAcabado === el.dataset.val || el.dataset.val==='') ? null : el.dataset.val;
  document.querySelectorAll('#chips-acabado span').forEach(function(ch){
    ch.classList.toggle('on', ch.dataset.val===selAcabado || (selAcabado===null && ch.dataset.val===''));
  });
}

function togChip(type, el){
  const val=el.dataset.val;
  if(type==='acabado'){
    // Selector único para acabado
    selAcabado = (selAcabado===val) ? null : val;
    document.querySelectorAll('#chips-acabado .chip').forEach(function(ch){
      ch.classList.toggle('on', ch.dataset.val===selAcabado);
    });
    return;
  }
  const arr=type==='mod'?selModelos:type==='comb'?selComb:selEtiq;
  const idx=arr.indexOf(val);
  if(idx>=0){arr.splice(idx,1);el.classList.remove('on');}else{arr.push(val);el.classList.add('on');}
  // Si cambian los modelos, actualizar chips de acabado
  if(type==='mod') actualizarChipsAcabado();
}

function actualizarChipsAcabado(){
  const zona = document.getElementById('frow-acabado');
  const chips = document.getElementById('chips-acabado');
  if(!zona||!chips) return;
  // Solo mostrar si hay exactamente 1 modelo seleccionado con jerarquía definida
  if(selModelos.length===0){
    zona.style.display='none'; selAcabado=null; return;
  }
  // Buscar el primer modelo con jerarquía
  let jerarquia=null, modeloRef=null;
  for(const m of selModelos){
    const key=Object.keys(ACABADOS_JERARQUIA).find(function(k){ return k.toUpperCase()===m.toUpperCase(); });
    if(key){ jerarquia=ACABADOS_JERARQUIA[key]; modeloRef=m; break; }
  }
  if(!jerarquia){ zona.style.display='none'; selAcabado=null; return; }
  zona.style.display='block';
  var chHtml='<span class="chip'+(selAcabado===null||selAcabado===''?' on':'')+'" data-val="" data-type="acabado" onclick="togChipAcabado(this)">Cualquiera</span>';
  chHtml+=jerarquia.map(function(a){
    return '<span class="chip'+(selAcabado===a?' on':'')+'" data-val="'+a+'" data-type="acabado" onclick="togChipAcabado(this)">'+a+'</span>';
  }).join('');
  chips.innerHTML=chHtml;
}

function saveCliente(){
  const nombre=document.getElementById('cn').value.trim();
  if(!nombre) return;
  const c={
    id:'C'+Date.now(), nombre,
    telefono:document.getElementById('ct').value,
    email:document.getElementById('ce').value,
    estado:'Activo',
    fechaCreacion:new Date().toISOString(),
    pref:{

function handleDrop(e){ e.preventDefault(); const f=e.dataTransfer.files[0]; if(f) handleFileInput(f); }

async function handleFileInput(file){
  if(!file) return;
  showParsingModal(file.name);
  const reader=new FileReader();
  reader.onload=async function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array',cellDates:true});
      const sheets=wb.SheetNames;
      if(sheets.includes('Stock VO')||sheets.includes('Stock Demo')){
        updateProgress(60,'Detectado formato Nissan...');
        const vehiculos=parsearExcelNissan(wb);
        if(!vehiculos.length){alert('No se encontraron vehículos disponibles');openExcelModal();return;}
        excelRawRows=vehiculos; excelMapeo={_nissan:true}; excelPreview=vehiculos.slice(0,5);
        updateProgress(100,'¡Listo!');
        setTimeout(function(){showMappingModalNissan(vehiculos);},400);
      } else {
        const sheet=wb.Sheets[wb.SheetNames[0]];
        const json=XLSX.utils.sheet_to_json(sheet,{defval:''});
        if(!json.length){alert('El archivo está vacío');openExcelModal();return;}
        const hdrs=Object.keys(json[0]);
        excelRawRows=json;
        const mapeo={
          matricula:hdrs.find(function(h){return /matr/i.test(h);}),
          modelo:hdrs.find(function(h){return /model/i.test(h);}),
          version:hdrs.find(function(h){return /ver/i.test(h);}),
          año:hdrs.find(function(h){return /a[ñn]o|year|fecha.mat/i.test(h);}),
          km:hdrs.find(function(h){return /km|kil/i.test(h);}),
          precio:hdrs.find(function(h){return /pvp|precio|price/i.test(h);}),
          color:hdrs.find(function(h){return /color/i.test(h);}),
          combustible:hdrs.find(function(h){return /comb|fuel/i.test(h);}),
          cambio:hdrs.find(function(h){return /trans|camb|caja/i.test(h);}),
          marca:hdrs.find(function(h){return /marca|brand/i.test(h);}),
          etiqueta:hdrs.find(function(h){return /etiq|dist/i.test(h);}),
        };
        excelMapeo=mapeo; excelPreview=procesarRows(json.slice(0,5),mapeo);
        updateProgress(100,'¡Listo!');
        setTimeout(function(){showMappingModal(json.length);},400);
      }
    }catch(err){alert('Error: '+err.message);openExcelModal();}
  };
  reader.readAsArrayBuffer(file);
}

// ── DIFF ──────────────────────────────────────────────────────────────────────
function diffStock(incoming){
  const map={};
  for(const v of STOCK){
    const k=(v.matricula||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
    if(k) map[k]=v;
  }
  const nuevos=[],bajadas=[],subidas=[],sinCambio=[],eliminados=[];
  // Eliminados: matrículas que estaban en STOCK y no están en incoming
  const incomingKeys=new Set(incoming.map(function(v){return (v.matricula||'').toUpperCase().replace(/[^A-Z0-9]/g,'');}));
  for(const v of STOCK){
    const k=(v.matricula||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
    if(k && !incomingKeys.has(k)) eliminados.push(v);
  }
  for(const v of incoming){
    const k=(v.matricula||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
    if(!k||!map[k]){ nuevos.push(v); }
    else{
      const prev=map[k], diff=v.precio-prev.precio;
      if(diff<0) bajadas.push({nuevo:v,anterior:prev,diff});
      else if(diff>0) subidas.push({nuevo:v,anterior:prev,diff});
      else sinCambio.push(v);
    }
  }
  return {nuevos,bajadas,subidas,sinCambio,eliminados};
}

          +'<div style="flex:1"><div style="font-weight:600;font-size:13px">'+x.nuevo.modelo+' <span style="font-family:monospace;font-size:11px;color:var(--muted)">'+x.nuevo.matricula+'</span></div></div>'
          +'<div style="text-align:right"><div style="font-family:\'Bebas Neue\',sans-serif;font-size:20px">'+x.nuevo.precio.toLocaleString()+'€</div>'
          +'<div style="font-size:11px;color:var(--muted);text-decoration:line-through">'+x.anterior.precio.toLocaleString()+'€</div>'
          +priceDiffHtml(x.diff)+'</div>'
        +'</div>';
      }).join('');
  }
  if(tab==='subidas'){
    body=!diff.subidas.length?'<div class="empty" style="padding:20px">No hay subidas de precio</div>'
      :'<div style="font-size:12px;color:var(--muted);margin-bottom:10px">'+diff.subidas.length+' vehículos con precio incrementado</div>'
      +diff.subidas.sort(function(a,b){return b.diff-a.diff;}).map(function(x){
        return '<div style="display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--border)">'
          +'<div style="font-size:22px">'+x.nuevo.foto+'</div>'
          +'<div style="flex:1"><div style="font-weight:600;font-size:13px">'+x.nuevo.modelo+' <span style="font-family:monospace;font-size:11px;color:var(--muted)">'+x.nuevo.matricula+'</span></div></div>'

      :'<div style="font-size:12px;color:var(--muted);margin-bottom:10px">'+diff.sinCambio.length+' vehículos sin variación</div>'

          +'<div style="flex:1;font-size:13px">'+v.modelo+' <span style="font-family:monospace;font-size:11px;color:var(--muted)">'+v.matricula+'</span></div>'
          +'<div style="font-family:\'Bebas Neue\',sans-serif;font-size:18px;color:var(--muted)">'+v.precio.toLocaleString()+'€</div>'
        +'</div>';
      }).join('');
  }

  const matchNote=matches>0
    ?'<div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--yellow);margin-bottom:14px">🔔 '+matches+' clientes encajan con los <strong>'+diff.nuevos.length+' coches nuevos</strong>. Revisa las alertas.</div>'
    :'';

  document.getElementById('modal-root').innerHTML=
    '<div class="mover" onclick="closeDone()">'
      +'<div class="modal" style="max-width:640px" onclick="event.stopPropagation()">'
        +'<div class="mtitle">📋 RESUMEN DE CAMBIOS</div>'
        +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">'
          +'<div style="background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);border-radius:8px;padding:10px;text-align:center"><div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;color:var(--green)">'+diff.nuevos.length+'</div><div style="font-size:11px;color:var(--muted)">Nuevos</div></div>'
          +'<div style="background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.18);border-radius:8px;padding:10px;text-align:center"><div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;color:var(--green)">'+diff.bajadas.length+'</div><div style="font-size:11px;color:var(--muted)">Bajadas €</div></div>'
          +'<div style="background:rgba(255,107,107,.07);border:1px solid rgba(255,107,107,.2);border-radius:8px;padding:10px;text-align:center"><div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;color:#ff6b6b">'+diff.subidas.length+'</div><div style="font-size:11px;color:var(--muted)">Subidas €</div></div>'
          +'<div style="background:var(--mid);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center"><div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;color:var(--muted)">'+diff.sinCambio.length+'</div><div style="font-size:11px;color:var(--muted)">Sin cambio</div></div>'
        +'</div>'
        +matchNote
        +'<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)">'+tabBar+'</div>'
        +'<div style="max-height:300px;overflow-y:auto;padding-right:4px">'+body+'</div>'
        +'<div style="display:flex;gap:8px;margin-top:14px">'
          +'<button class="btn w100" onclick="closeDone()">✓ Aceptar y ver alertas</button>'
          +'<button class="btn sec" onclick="closeModal()">Cerrar</button>'
        +'</div>'
      +'</div>'
    +'</div>';
}

function closeDone(){ closeModal(); updateBadges(); showTab('alertas'); }

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  if(SCRIPT_URL){
    showLoadingBanner('Conectando con Google Sheets...');
    const ok=await cargarDatos();
    buildAlertas();
    renderDashboard();
    loadMsgs();
    updateBadges();
    if(ok){
      showSyncOk('✓ Conectado a Google Sheets');
    } else {
      hideLoadingBanner();
      // URL configurada pero fallo de red — mostrar igual el dashboard
      // con botón para reintentar
      const banner=document.createElement('div');
      banner.style.cssText='background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--yellow);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px';
      banner.innerHTML='⚠️ No se pudo conectar a Google Sheets. Los datos pueden no estar actualizados. <button onclick="location.reload()" style="background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.4);color:var(--yellow);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;font-family:DM Sans,sans-serif">Reintentar</button>';
      const main=document.querySelector('.main');
      if(main) main.prepend(banner);
    }
    return;
  }
  mostrarConfigSheet();
}

      +steps.map(function(s,i){
        return '<div style="display:flex;gap:14px;margin-bottom:18px">'
          +'<div style="width:28px;height:28px;border-radius:50%;background:var(--red);color:white;font-weight:700;font-size:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center">'+(i+1)+'</div>'

function desconectarSheets(){
  if(!confirm('¿Desconectar Google Sheets? Podrás volver a conectar con una URL nueva.')) return;
  SCRIPT_URL='';
  localStorage.removeItem('nissan_vo_script_url');
  SHEETS_CONECTADO=false;
  renderDashboard();
  showSyncOk('Desconectado de Google Sheets');
}

function abrirModalConectar(){
  document.getElementById('modal-root').innerHTML=
    '<div class="mover" onclick="closeModal()">'
      +'<div class="modal" style="max-width:480px" onclick="event.stopPropagation()">'
        +'<div class="mtitle">🔗 CONECTAR GOOGLE SHEETS</div>'
        +'<div class="frow">'
          +'<label>URL de tu Apps Script</label>'
          +'<input id="url-input" placeholder="https://script.google.com/macros/s/.../exec">'
        +'</div>'
        +'<div class="flex gap2 mt3">'
          +'<button class="btn w100" onclick="conectarSheet()">Conectar</button>'
          +'<button class="btn sec" onclick="closeModal()">Cancelar</button>'
        +'</div>'
      +'</div>'
    +'</div>';
}

function conectarSheet(){
  const url=(document.getElementById('url-input')||{}).value||'';
  if(!url||!url.includes('script.google.com')){ alert('Por favor pega una URL válida de Google Apps Script'); return; }
  SCRIPT_URL=url;
  localStorage.setItem('nissan_vo_script_url',url);
  closeModal();
  showLoadingBanner('Verificando conexión...');
  cargarDatos().then(function(ok){
    if(ok){ buildAlertas(); renderDashboard(); loadMsgs(); updateBadges(); showSyncOk('✓ Conectado a Google Sheets'); }
    else { alert('No se pudo conectar. Verifica la URL y que la implementación es pública.'); SCRIPT_URL=''; localStorage.removeItem('nissan_vo_script_url'); renderDashboard(); }
  });
}
